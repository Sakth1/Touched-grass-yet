name: Auto Release On Version Bump

on:
  push:
    branches:
      - master
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump in pyproject.toml
        id: detect
        shell: bash
        run: |
          python scripts/ci/release_metadata.py detect-version-bump \
            --pyproject pyproject.toml \
            --before "${{ github.event.before }}"

      - name: Print decision
        run: |
          echo "previous_version=${{ steps.detect.outputs.previous_version }}"
          echo "current_version=${{ steps.detect.outputs.current_version }}"
          echo "should_release=${{ steps.detect.outputs.should_release }}"
          echo "reason=${{ steps.detect.outputs.reason }}"

      - name: Check if tag already exists
        if: steps.detect.outputs.should_release == 'true'
        id: tag_exists
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.detect.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.detect.outputs.should_release == 'true' && steps.tag_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          name: Release ${{ steps.detect.outputs.current_version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.detect.outputs.current_version, '-') }}

      - name: Trigger release binaries workflow
        if: steps.detect.outputs.should_release == 'true' && steps.tag_exists.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release-build.yml",
              ref: context.ref.replace("refs/heads/", ""),
              inputs: {
                release_tag: "${{ steps.detect.outputs.tag }}"
              }
            });

      - name: Skip when tag already exists
        if: steps.detect.outputs.should_release == 'true' && steps.tag_exists.outputs.exists == 'true'
        run: echo "Tag already exists. Release creation skipped."
