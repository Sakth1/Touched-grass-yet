name: Build Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish assets to (example: v0.1.0-alpha.1 or 0.1.0-alpha.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_stem: ${{ steps.meta.outputs.artifact_stem }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_enabled: ${{ steps.meta.outputs.publish_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read metadata from pyproject.toml
        id: meta
        shell: bash
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_INPUTS_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          release_tag="${EVENT_RELEASE_TAG:-$EVENT_INPUTS_RELEASE_TAG}"
          python scripts/ci/release_metadata.py extract-release-metadata \
            --pyproject pyproject.toml \
            --event-name "${{ github.event_name }}" \
            --release-tag "$release_tag"

  build-windows:
    runs-on: windows-latest
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Flet CLI
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install flet-cli

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build Windows EXE
        shell: pwsh
        run: |
          chcp 65001 > $null
          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          flet build windows --yes --skip-flutter-doctor --no-rich-output

      - name: Package portable ZIP and installer
        id: collect
        shell: pwsh
        run: |
          $allExeCandidates = @(Get-ChildItem -Path build, dist -Recurse -Filter *.exe -File -ErrorAction SilentlyContinue)
          $allExeCandidates = $allExeCandidates | Where-Object {
            $_.Name -notin @("python.exe", "pythonw.exe", "flet.exe", "httpx.exe") -and
            $_.FullName -notmatch "\\site-packages\\bin\\" -and
            $_.FullName -notmatch "\\CompilerId" -and
            $_.FullName -notmatch "\\build_python_" -and
            $_.FullName -notmatch "\\python\\"
          }

          $exe = $allExeCandidates |
            Where-Object { $_.DirectoryName -match "\\build\\windows$" } |
            Select-Object -First 1

          if (-not $exe) {
            $exe = $allExeCandidates |
              Where-Object { $_.DirectoryName -match "\\build\\flutter\\build\\windows\\x64\\runner\\Release$" } |
              Select-Object -First 1
          }

          if (-not $exe) {
            $exe = $allExeCandidates | Select-Object -First 1
          }

          if (-not $exe) {
            throw "No application .exe output found. Candidates were filtered to avoid Python/tool executables."
          }

          $bundleDir = $exe.DirectoryName
          $pythonDll = Join-Path $bundleDir "python312.dll"
          if (-not (Test-Path $pythonDll)) {
            throw "Windows bundle appears incomplete: python312.dll not found next to executable."
          }

          Write-Host "Selected app executable: $($exe.FullName)"

          $portableName = "${{ needs.metadata.outputs.artifact_stem }}-portable.zip"
          if (Test-Path $portableName) {
            Remove-Item $portableName -Force
          }
          Compress-Archive -Path (Join-Path $bundleDir "*") -DestinationPath $portableName -CompressionLevel Optimal

          $installerBase = "${{ needs.metadata.outputs.artifact_stem }}-setup"
          $installerName = "$installerBase.exe"
          $issPath = Join-Path $PWD "installer.iss"
          $appName = "Touched Grass Yet"
          $appVersion = "${{ needs.metadata.outputs.version }}"
          $exeName = $exe.Name

          @"
          #define MyAppName "$appName"
          #define MyAppVersion "$appVersion"
          #define MyAppPublisher "Flet"
          #define MyAppExeName "$exeName"

          [Setup]
          AppId={{D2E3F4A5-B6C7-48D9-A0B1-C2D3E4F5A6B7}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=$($PWD.Path)
          OutputBaseFilename=$installerBase
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

          [Files]
          Source: "$bundleDir\\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path $issPath -Encoding UTF8

          $isccPath = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $isccPath)) {
            $isccFromPath = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
            if ($isccFromPath) {
              $isccPath = $isccFromPath
            } else {
              throw "ISCC.exe not found after installing Inno Setup."
            }
          }

          & $isccPath $issPath
          if (-not (Test-Path $installerName)) {
            throw "Installer was not produced at expected path: $installerName"
          }

          "portable_path=$portableName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_path=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_stem }}-windows
          path: |
            ${{ steps.collect.outputs.portable_path }}
            ${{ steps.collect.outputs.installer_path }}

  build-android:
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install project and Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install flet-cli

      - name: Build Android APK
        run: |
          flet build apk --yes --compile-packages --skip-flutter-doctor --no-rich-output

      - name: Decode Android keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Install Android build tools
        shell: bash
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "build-tools;35.0.0"

      - name: Locate APK
        id: locate_apk
        shell: pwsh
        run: |
          $candidateDirs = @("build", "dist")
          $apks = @()

          foreach ($dir in $candidateDirs) {
            if (Test-Path $dir) {
              $apks += Get-ChildItem -Path $dir -Recurse -Filter *.apk -File
            }
          }

          if ($apks.Count -eq 0) {
            throw "No .apk output found in build/ or dist/."
          }

          $apk = $apks | Select-Object -First 1
          Write-Host "Discovered APK: $($apk.FullName)"
          "apk_path=$($apk.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Align APK
        shell: bash
        run: |
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/zipalign" -f -p 4 "${{ steps.locate_apk.outputs.apk_path }}" aligned.apk

      - name: Sign APK
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cp aligned.apk signed.apk
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            signed.apk

      - name: Verify signed APK
        shell: bash
        run: |
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" verify signed.apk

      - name: Collect APK
        id: collect
        shell: pwsh
        run: |
          $newApkName = "${{ needs.metadata.outputs.artifact_stem }}.apk"

          if (-not (Test-Path "signed.apk")) {
            throw "Signed APK not found."
          }

          Move-Item -Path "signed.apk" -Destination $newApkName -Force

          "path=$newApkName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_stem }}-android
          path: ${{ steps.collect.outputs.path }}

  publish-release:
    runs-on: ubuntu-latest
    if: needs.metadata.outputs.publish_enabled == 'true'
    needs:
      - metadata
      - build-windows
      - build-android

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_stem }}-windows
          path: release-assets

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_stem }}-android
          path: release-assets

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          files: |
            release-assets/*-portable.zip
            release-assets/*-setup.exe
            release-assets/*.apk
